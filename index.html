<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KTU 2024 Scheme SGPA & CGPA Calculator</title>
<style>
:root{--bg:#071020;--card:#0b1622;--muted:#9aa4b2;--accent:#60a5fa;--pass:#14382a;--fail:#7f1d1d}
.light{--bg:#f5f7fb;--card:#ffffff;--muted:#4b5563;--accent:#2563eb;--pass:#d1fae5;--fail:#fee2e2;color:#000}
*{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Arial}
body{margin:0;background:var(--bg);color:inherit;padding:18px}
.wrap{max-width:980px;margin:18px auto}
.card{background:var(--card);padding:14px;border-radius:10px;margin-bottom:14px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
button{border:0;border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:600}
.btn-primary{background:linear-gradient(90deg,var(--accent),#2563eb);color:#021226}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.08);color:var(--muted)}
table{width:100%;border-collapse:collapse;margin-top:6px}
th,td{padding:8px;text-align:left;font-size:13px}
input{background:transparent;border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:6px;color:inherit;width:100%}
.pass{background:rgba(20,83,45,.12)}
.fail{background:rgba(127,29,29,.12)}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<div class="controls">
<button id="addCourseBtn">+ Add Course</button>
<button id="addWorkshopBtn">+ Add Workshop</button>
<button id="clearSemesterBtn">Clear Semester</button>
<button id="toggleTheme">Theme</button>
<button id="exportPDF">PDF</button>
</div>

<table>
<thead>
<tr>
<th>Course</th><th>Type</th><th>Credits</th>
<th>CIA</th><th>ESE</th><th>%</th>
<th>Grade</th><th>GPA</th><th></th>
</tr>
</thead>
<tbody id="courseBody"></tbody>
</table>

<div>
Credits: <span id="totalCredits">0</span> |
SGPA: <span id="sgpa">0.00</span>
<button id="addSemToCgpa">Add Sem</button>
</div>
</div>

<div class="card">
<table>
<thead><tr><th>Sem</th><th>SGPA</th><th>Credits</th><th></th></tr></thead>
<tbody id="cgpaBody"></tbody>
</table>
CGPA: <span id="cgpa">0.00</span>
</div>

</div>

<script>
const courseBody=document.getElementById('courseBody');
const totalCreditsEl=document.getElementById('totalCredits');
const sgpaEl=document.getElementById('sgpa');
const cgpaBody=document.getElementById('cgpaBody');
const cgpaEl=document.getElementById('cgpa');

let cgpaSems=[];
let locked=false;

function gradeFromPercent(p){
if(p>=90)return['S',10];
if(p>=85)return['A+',9];
if(p>=80)return['A',8.5];
if(p>=75)return['B+',8];
if(p>=70)return['B',7.5];
if(p>=65)return['C+',7];
if(p>=60)return['C',6.5];
if(p>=55)return['D',6];
if(p>=50)return['P',5.5];
return['F',0];
}

function createRow(w=false){
if(locked)return alert("Semester locked");
const tr=document.createElement('tr');
tr.dataset.isWorkshop=w?'1':'0';

tr.innerHTML=`
<td><input></td>
<td>${w?'Workshop':'Regular'}</td>
<td><input type="number" value="3"></td>
<td><input type="number"></td>
<td><input type="number"></td>
<td>-</td><td>-</td><td>-</td>
<td><button>Del</button></td>
`;

tr.querySelectorAll('input').forEach(i=>i.oninput=calc);
tr.querySelector('button').onclick=()=>{tr.remove();calc();};

courseBody.appendChild(tr);
calc();
}

document.getElementById('addCourseBtn').onclick=()=>createRow(false);
document.getElementById('addWorkshopBtn').onclick=()=>createRow(true);
document.getElementById('clearSemesterBtn').onclick=()=>{courseBody.innerHTML='';calc();locked=false;};

document.getElementById('addSemToCgpa').onclick=()=>{
let sg=parseFloat(sgpaEl.textContent)||0;
let cr=parseFloat(totalCreditsEl.textContent)||0;
if(cr<=0)return;
let name=prompt("Semester name","S"+(cgpaSems.length+1));
cgpaSems.push({sgpa:sg,credits:cr,name:name||("S"+(cgpaSems.length+1))});
locked=true;
renderCgpa();
};

function calc(){
let tc=0,ws=0;
let dist={};

[...courseBody.children].forEach(tr=>{
let c=Number(tr.children[2].firstChild.value)||0;
let cia=Number(tr.children[3].firstChild.value)||0;
let ese=Number(tr.children[4].firstChild.value)||0;

if(cia>40)alert("CIA > 40");
if(ese>100)alert("ESE too high");

let total=cia+ese;
let [g,gp]=gradeFromPercent(total);

tr.children[5].textContent=total;
tr.children[6].textContent=g;
tr.children[7].textContent=gp;

dist[g]=(dist[g]||0)+1;

tc+=c;
ws+=c*gp;
});

totalCreditsEl.textContent=tc;
sgpaEl.textContent=tc?(ws/tc).toFixed(2):'0.00';

window.gradeDist=dist;
}

function renderCgpa(){
cgpaBody.innerHTML='';
let sum=0,cr=0;

cgpaSems.forEach((s,i)=>{
const tr=document.createElement('tr');
tr.innerHTML=`
<td>${s.name}</td>
<td>${s.sgpa}</td>
<td>${s.credits}</td>
<td><button>Del</button></td>
`;
tr.querySelector('button').onclick=()=>{cgpaSems.splice(i,1);renderCgpa();};
cgpaBody.appendChild(tr);
sum+=s.sgpa*s.credits;
cr+=s.credits;
});

cgpaEl.textContent=cr?(sum/cr).toFixed(2):'0.00';
}

/* FEATURES */

// Goal planner
function goal(){
let t=prompt("Target CGPA");
let r=prompt("Remaining sems");
let cur=parseFloat(cgpaEl.textContent)||0;
let done=cgpaSems.length;
alert(((t*(done+r)-(cur*done))/r).toFixed(2));
}

// Contribution
function impact(){
let arr=[...courseBody.children].map(tr=>{
let n=tr.children[0].firstChild.value||"Course";
let c=Number(tr.children[2].firstChild.value)||0;
let gp=Number(tr.children[7].textContent)||0;
return {n,v:c*gp};
});
arr.sort((a,b)=>a.v-b.v);
alert(arr.map(x=>x.n+" "+x.v).join("\n"));
}

// Revaluation
function reval(){alert("Edit marks to simulate");}

// Backlog
function backlog(){
let f=[...courseBody.children].filter(tr=>tr.children[6].textContent==='F'||tr.children[6].textContent==='FE');
alert("Backlogs: "+f.length);
}

// Distribution
function dist(){
alert(JSON.stringify(window.gradeDist||{}));
}

// Required marks predictor
function predictor(){
let target=prompt("Target total %");
alert("Enter marks manually to test");
}

// Unlock
function unlock(){locked=false;}

// Theme
document.getElementById('toggleTheme').onclick=()=>{
document.body.classList.toggle('light');
};

// PDF
document.getElementById('exportPDF').onclick=()=>window.print();

// Buttons
const ctrl=document.querySelector('.controls');
[
["Goal",goal],
["Impact",impact],
["Reval",reval],
["Backlog",backlog],
["Dist",dist],
["Unlock",unlock],
["Predict",predictor]
].forEach(([t,f])=>{
let b=document.createElement('button');
b.textContent=t;
b.onclick=f;
ctrl.appendChild(b);
});

</script>
</body>
</html>
