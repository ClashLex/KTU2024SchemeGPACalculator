<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KTU 2024 Scheme SGPA & CGPA Calculator</title>
<style>
:root{
--bg:#071020;--card:#0b1622;--text:#e6eef6;--muted:#9aa4b2;
}
.light{
--bg:#f5f7fb;--card:#ffffff;--text:#0b1622;--muted:#5b6470;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter;padding:18px}
.card{background:var(--card);padding:14px;border-radius:10px;margin-bottom:14px}
button{padding:8px 12px;border-radius:8px;border:0;cursor:pointer}
.btn-primary{background:#3b82f6;color:white}
.btn-ghost{background:transparent;border:1px solid #333;color:var(--muted)}
input,select{width:100%;padding:6px;border-radius:6px;border:1px solid #333;background:transparent;color:inherit}
table{width:100%;border-collapse:collapse}
td,th{padding:8px}
.fail{background:#7f1d1d33}
.pass{background:#14532d33}
</style>
</head>
<body>

<div class="card">
<button id="themeToggle" class="btn-ghost">Toggle Theme</button>
<button id="pdfBtn" class="btn-ghost">Export PDF</button>
</div>

<div class="card">
<h3>Required Marks Predictor</h3>
<input id="targetGrade" placeholder="Target Grade % (e.g. 80)">
<input id="predictCIA" placeholder="CIA Marks">
<input id="predictESE" placeholder="ESE Max (60/50)">
<button id="predictBtn" class="btn-primary">Calculate</button>
<div id="predictResult"></div>
</div>

<div class="card">
<h3>Grade Distribution</h3>
<div id="gradeDist"></div>
</div>

<div class="card">
<h3>Backlog Tracker</h3>
<div id="backlog"></div>
</div>

<div class="card">
<h3>Semester</h3>
<input id="semName" placeholder="Enter Semester Name (S1, S2...)">
<button id="addSemBtn" class="btn-primary">Add Semester</button>
<table>
<tbody id="cgpaBody"></tbody>
</table>
</div>

<script>
/* THEME */
document.getElementById('themeToggle').onclick=()=>{
document.body.classList.toggle('light')
}

/* PDF EXPORT */
document.getElementById('pdfBtn').onclick=()=>{
window.print()
}

/* REQUIRED MARKS */
document.getElementById('predictBtn').onclick=()=>{
let target=+document.getElementById('targetGrade').value
let cia=+document.getElementById('predictCIA').value
let eseMax=+document.getElementById('predictESE').value

let needed=target-cia
document.getElementById('predictResult').innerText=
"Need "+needed+" out of "+eseMax+" in ESE"
}

/* DATA */
let cgpaSems=JSON.parse(localStorage.getItem("cgpaSems")||"[]")

/* ADD SEM WITH NAME */
document.getElementById('addSemBtn').onclick=()=>{
let name=document.getElementById('semName').value||"Sem"
cgpaSems.push({name:name,sgpa:0,credits:0})
save()
render()
}

/* RENDER */
function render(){
let body=document.getElementById('cgpaBody')
body.innerHTML=''

let grades={}
let backlog=0

cgpaSems.forEach((s,i)=>{
let tr=document.createElement('tr')
tr.innerHTML=`<td>${s.name}</td>
<td>${s.sgpa}</td>
<td>${s.credits}</td>
<td><button onclick="del(${i})">Del</button></td>`
body.appendChild(tr)

if(s.sgpa<5) backlog++
grades[s.sgpa]=(grades[s.sgpa]||0)+1
})

/* BACKLOG */
document.getElementById('backlog').innerText=
"Backlogs: "+backlog

/* GRADE DIST */
let dist=""
for(let g in grades){
dist+=g+": "+grades[g]+" | "
}
document.getElementById('gradeDist').innerText=dist
}

/* DELETE */
function del(i){
cgpaSems.splice(i,1)
save()
render()
}

/* SAVE */
function save(){
localStorage.setItem("cgpaSems",JSON.stringify(cgpaSems))
}

render()
</script>
</body>
</html>
