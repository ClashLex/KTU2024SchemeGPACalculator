<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KTU 2024 Scheme SGPA & CGPA Calculator</title>

<style>
:root{--bg:#071020;--card:#0b1622;--text:#e6eef6;--muted:#9aa4b2;--accent:#60a5fa;--pass:#14382a;--fail:#7f1d1d}
.light{--bg:#f5f7fb;--card:#ffffff;--text:#111827;--muted:#4b5563;--accent:#2563eb;--pass:#d1fae5;--fail:#fee2e2}
*{box-sizing:border-box;font-family:Inter,system-ui}
body{margin:0;background:var(--bg);color:var(--text);padding:18px}
.card{background:var(--card);padding:14px;border-radius:10px;margin-bottom:14px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
button{border:0;border-radius:8px;padding:8px 12px;cursor:pointer}
table{width:100%;border-collapse:collapse}
td,th{padding:6px}
input,select{width:100%;background:transparent;border:1px solid #444;color:inherit}
.pass{background:var(--pass)}
.fail{background:var(--fail)}
</style>
</head>

<body>

<div class="card">
<div class="controls">
<button onclick="addRow()">+ Add Course</button>
<button onclick="clearSem()">Clear Semester</button>
<button onclick="toggleTheme()">Theme</button>
</div>

<table>
<thead>
<tr>
<th>Course</th><th>Type</th><th>Credits</th>
<th>CIA</th><th>ESE</th><th>%</th><th>Grade</th><th>GPA</th><th></th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

Credits: <span id="cr">0</span> |
SGPA: <span id="sg">0</span>
<button onclick="addSem()">Add Sem</button>
</div>

<div class="card">
<table>
<thead><tr><th>Sem</th><th>SGPA</th><th>Credits</th></tr></thead>
<tbody id="cg"></tbody>
</table>
CGPA: <span id="cgpa">0</span>
</div>

<script>

let sems=[],locked=false;

function grade(p){
if(p>=90)return['S',10];
if(p>=85)return['A+',9];
if(p>=80)return['A',8.5];
if(p>=75)return['B+',8];
if(p>=70)return['B',7.5];
if(p>=65)return['C+',7];
if(p>=60)return['C',6.5];
if(p>=55)return['D',6];
if(p>=50)return['P',5.5];
return['F',0];
}

function addRow(){
if(locked)return alert("Locked");

let tr=document.createElement('tr');

tr.innerHTML=`
<td><input></td>
<td>
<select>
<option>Regular</option>
<option>Workshop</option>
<option>Supplementary</option>
<option>Challenge</option>
</select>
</td>
<td><input type="number" value="3"></td>
<td><input type="number"></td>
<td><input type="number"></td>
<td>-</td><td>-</td><td>-</td>
<td><button>Del</button></td>
`;

tr.querySelectorAll('input,select').forEach(x=>x.oninput=calc);
tr.querySelector('button').onclick=()=>{tr.remove();calc();};

document.getElementById('body').appendChild(tr);
calc();
}

function clearSem(){
document.getElementById('body').innerHTML='';
locked=false;
calc();
}

function calc(){
let rows=[...document.getElementById('body').children];
let tc=0,ws=0;

rows.forEach(tr=>{
let type=tr.children[1].firstChild.value;
let c=+tr.children[2].firstChild.value||0;
let cia=+tr.children[3].firstChild.value||0;
let ese=+tr.children[4].firstChild.value||0;

if(cia>40)alert("CIA > 40");
if(ese>100)alert("ESE too high");

let total=cia+ese;
let g,gp;

if(type==="Challenge"){
total=ese;
if(ese<36){g='F';gp=0;}
else{[g,gp]=grade(ese);}
}else{
[g,gp]=grade(total);
}

tr.children[5].textContent=total;
tr.children[6].textContent=g;
tr.children[7].textContent=gp;

tc+=c;
ws+=c*gp;
});

document.getElementById('cr').textContent=tc;
document.getElementById('sg').textContent=tc?(ws/tc).toFixed(2):0;
}

function addSem(){
let sg=+document.getElementById('sg').textContent;
let cr=+document.getElementById('cr').textContent;
if(!cr)return;

let name=prompt("Name","S"+(sems.length+1));
sems.push({sg,cr,name});
locked=true;
render();
}

function render(){
let sum=0,cr=0;
let body=document.getElementById('cg');
body.innerHTML='';

sems.forEach((s,i)=>{
let tr=document.createElement('tr');
tr.innerHTML=`<td>${s.name}</td><td>${s.sg}</td><td>${s.cr}</td>`;
body.appendChild(tr);
sum+=s.sg*s.cr;
cr+=s.cr;
});

document.getElementById('cgpa').textContent=cr?(sum/cr).toFixed(2):0;
}

function toggleTheme(){
document.body.classList.toggle('light');
}

</script>
</body>
</html>
