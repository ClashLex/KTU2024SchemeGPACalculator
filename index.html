<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KTU 2024 Scheme SGPA & CGPA Calculator</title>
<style>
:root{--bg:#071020;--card:#0b1622;--muted:#9aa4b2;--accent:#60a5fa}
body.light{--bg:#f4f6f8;--card:#ffffff;--muted:#555;--accent:#2563eb;color:#111}
*{box-sizing:border-box;font-family:Inter,system-ui}
body{margin:0;background:var(--bg);color:#e6eef6;padding:18px}
.wrap{max-width:980px;margin:auto}
.card{background:var(--card);padding:14px;border-radius:10px;margin-bottom:14px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
button{padding:8px 12px;border-radius:8px;border:0;cursor:pointer}
.btn-primary{background:var(--accent)}
.btn-ghost{background:transparent;border:1px solid #444;color:#aaa}
table{width:100%}
td,th{padding:6px}
input{width:100%}
.stat{margin-top:10px}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
<div class="controls">
<button onclick="createRow(false)">+ Add Course</button>
<button onclick="createRow(true)">+ Add Workshop</button>
<button onclick="clearSem()">Clear Semester</button>
<button onclick="toggleTheme()">Theme</button>
</div>

<table>
<thead>
<tr>
<th>Course</th><th>Type</th><th>Credits</th><th>CIA</th><th>ESE</th><th>%</th><th>Grade</th><th>GPA</th><th></th>
</tr>
</thead>
<tbody id="courseBody"></tbody>
</table>

<div class="stat">Credits: <span id="tc">0</span></div>
<div class="stat">SGPA: <span id="sg">0</span></div>
<div class="stat">Backlogs: <span id="bl">0</span></div>

<input id="targetCgpa" placeholder="Target CGPA">
<input id="remSem" placeholder="Remaining Sem">
<button onclick="cgpaPlan()">Plan</button>
<div id="cgpaPlanOut"></div>

<button onclick="addSem()">Add Sem</button>
</div>

<div class="card">
<table>
<thead><tr><th>Sem</th><th>SGPA</th><th>Credits</th><th></th></tr></thead>
<tbody id="cgpaBody"></tbody>
</table>
<div>CGPA: <span id="cg">0</span></div>
</div>

</div>

<script>
let cg=[];

const tcEl=document.getElementById("tc");
const sgEl=document.getElementById("sg");
const blEl=document.getElementById("bl");
const cgEl=document.getElementById("cg");

function grade(p){
if(p>=90)return['S',10];
if(p>=80)return['A',8];
if(p>=70)return['B',7];
if(p>=60)return['C',6];
if(p>=50)return['P',5];
return['F',0];
}

function createRow(w){
let tr=document.createElement("tr");
tr.innerHTML=`
<td><input></td>
<td>${w?'W':'R'}</td>
<td><input type=number value=3></td>
<td><input type=number></td>
<td><input type=number></td>
<td>-</td><td>-</td><td>-</td>
<td><button onclick="this.closest('tr').remove();calc()">X</button></td>`;
tr.dataset.w=w?1:0;

tr.querySelectorAll("input").forEach(i=>i.oninput=calc);

courseBody.appendChild(tr);
calc();
return tr;
}

function calc(){
let rows=[...courseBody.children];
let tc=0,sum=0,bl=0;

rows.forEach(r=>{
let w=r.dataset.w==1;
let c=+r.children[2].firstChild.value||0;
let cia=+r.children[3].firstChild.value||0;
let ese=+r.children[4].firstChild.value||0;

if(cia>40){alert("CIA > 40");cia=40;r.children[3].firstChild.value=40;}
let max=w?50:60;
if(ese>max){alert("ESE > max");ese=max;r.children[4].firstChild.value=max;}

let p=cia+ese;
let g,gp;

if(ese<0.4*max){g='F';gp=0;bl++}
else if(p<50){g='FE';gp=0;bl++}
else [g,gp]=grade(p);

r.children[5].innerText=p;
r.children[6].innerText=g;
r.children[7].innerText=gp;

tc+=c;
sum+=c*gp;
});

tcEl.innerText=tc;
sgEl.innerText=tc?(sum/tc).toFixed(2):0;
blEl.innerText=bl;
}

function addSem(){
let sg=parseFloat(sgEl.innerText)||0;
let cr=parseFloat(tcEl.innerText)||0;
if(cr<=0)return alert("No credits");

let name=prompt("Sem name:");
cg.push({sg,cr,name});
render();
}

function render(){
cgpaBody.innerHTML="";
let sum=0,cr=0;

cg.forEach((s,i)=>{
let tr=document.createElement("tr");
tr.innerHTML=`<td>${s.name}</td><td>${s.sg}</td><td>${s.cr}</td>
<td><button onclick="cg.splice(${i},1);render()">X</button></td>`;
cgpaBody.appendChild(tr);

sum+=s.sg*s.cr;
cr+=s.cr;
});

cgEl.innerText=cr?(sum/cr).toFixed(2):0;
}

function cgpaPlan(){
let t=+targetCgpa.value;
let rem=+remSem.value;
let curr=+cgEl.innerText||0;
if(!t||!rem)return;

let req=((t*(cg.length+rem))-(curr*cg.length))/rem;
cgpaPlanOut.innerText=req.toFixed(2);
}

function clearSem(){courseBody.innerHTML="";calc();}
function toggleTheme(){document.body.classList.toggle("light");}
</script>

</body>
</html>
